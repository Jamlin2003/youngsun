<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>YoungSun Admin</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="admin.css"></head><body><div class="wrap"><div class="top"><div class="brand"><h1>YOUNGSUN ADMIN</h1><p>揚生青年翻轉自學小組｜網站內容管理</p></div><a href="../index.html">回到網站</a></div><section id="login" class="login"><h2>登入後台</h2><p>第一版是簡易門禁。真正發布到 GitHub 時，會另外要求你輸入 GitHub Token。</p><label>帳號</label><input id="user" placeholder="admin"><br><br><label>密碼</label><input id="pass" type="password" placeholder="youngsun"><div class="actions"><button class="btn" id="loginBtn">登入</button></div><p class="status" id="loginStatus"></p></section><section id="admin" class="hidden"><div class="hint">重要：請不要把 GitHub Token 貼給任何人。Token 只會存在你的瀏覽器 localStorage，不會寫進網站檔案。</div><div class="grid"><aside class="side" id="fileTabs"></aside><main class="panel"><h2 id="editorTitle">內容管理</h2><label>GitHub Token（發布時需要）</label><input id="token" type="password" placeholder="ghp_xxx"><div class="actions"><button class="btn secondary" id="saveToken">儲存 Token 到本機</button><button class="btn secondary" id="clearToken">清除 Token</button></div><br><label>JSON 內容</label><textarea id="editor"></textarea><div class="actions"><button class="btn" id="formatBtn">格式化 JSON</button><button class="btn secondary" id="downloadBtn">下載目前 JSON</button><button class="btn" id="publishBtn">發布到 GitHub</button></div><p class="status" id="status"></p></main></div></section></div><script src="admin.js"></script></body></html>
